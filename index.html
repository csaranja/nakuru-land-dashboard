<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nakuru County Revenue Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
header {
  background: #2c7be5;
  color: white;
  padding: 12px;
  font-size: 18px;
  text-align: center;
}

/* LAYOUT */
#container {
  display: flex;
  flex: 1;
}

/* SIDEBAR */
#sidebar {
  width: 320px;
  background: #1e1e1e;
  color: white;
  padding: 10px;
  transition: all 0.3s ease;
  overflow-y: auto;
}

/* COLLAPSED SIDEBAR */
#sidebar.collapsed {
  width: 70px; /* 👈 keeps button visible */
  padding: 10px 5px;
  overflow: hidden;
}

/* HIDE CONTENT WHEN COLLAPSED */
#sidebar.collapsed .card {
  display: none;
}

/* TOGGLE BUTTON INSIDE SIDEBAR */
#toggleSidebar {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
  border: none;
  background: #1a5fd0;
  color: white;
  cursor: pointer;
  border-radius: 6px;
  font-size: 16px;
}

/* MAP */
#map {
  flex: 1;
}

/* UI CARDS */
.card {
  background: #2a2a2a;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

/* INPUTS */
input, select, button {
  width: 100%;
  padding: 6px;
  margin-top: 5px;
}

/* AUTOCOMPLETE */
#suggestions {
  background: white;
  color: black;
  max-height: 120px;
  overflow-y: auto;
  border-radius: 4px;
}
</style>
</head>

<body>

<header>
  Nakuru Land Rates System
</header>

<div id="container">

<!-- SIDEBAR -->
<div id="sidebar">

<button id="toggleSidebar" onclick="toggleSidebar()">☰</button>

<div class="card">
<h3>Search</h3>
<input id="searchBox" placeholder="Search plot or owner" oninput="showSuggestions()">
<div id="suggestions"></div>
<button onclick="smartSearch()">Search</button>
</div>

<div class="card">
<h3>Filter</h3>
<select id="statusFilter" onchange="applyFilter()">
<option value="all">All</option>
<option value="paid">Paid</option>
<option value="not">Not Paid</option>
<option value="partial">Partial</option>
</select>
</div>

<!-- ✅ SLIDER -->
<div class="card">
<h3>Amount Due Filter</h3>
<input type="range" id="amountSlider" min="0" max="100000" step="1000" value="100000"
       oninput="filterByAmount(this.value)">
<p>Max Amount Due: <span id="sliderValue">100000</span></p>
</div>

<div class="card" id="stats"></div>

<div class="card">
<h3>Payment Status</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Revenue Overview</h3>
<canvas id="barChart"></canvas>
</div>

<div class="card">
<button onclick="exportCSV()">Export CSV</button>
</div>

</div>

<!-- MAP -->
<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
