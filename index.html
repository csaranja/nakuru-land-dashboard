<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nakuru County Revenue Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: #f4f6f9;
}

/* HEADER */
header {
  background: linear-gradient(90deg, #2c7be5, #1a5fd0);
  color: white;
  padding: 14px;
  font-size: 18px;
  text-align: center;
}

/* CONTAINER */
#container {
  display: flex;
  flex: 1;
  position: relative;
}

/* SIDEBAR */
#sidebar {
  width: 320px;
  background: #1e1e1e;
  color: white;
  padding: 10px;
  overflow-y: auto;
  transition: 0.3s;
}

/* DESKTOP COLLAPSE */
#sidebar.collapsed {
  width: 70px;
}

/* MOBILE MODE */
@media (max-width: 768px) {

  #sidebar {
    position: absolute;
    top: 0;
    left: -100%;
    height: 100%;
    width: 260px;
    z-index: 1000;
  }

  #sidebar.active {
    left: 0;
  }

  #map {
    width: 100%;
  }

  /* Floating menu button */
  #mobileMenuBtn {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1100;
    background: #2c7be5;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 6px;
  }
}

/* MAP */
#map {
  flex: 1;
}

/* CARDS */
.card {
  background: #2a2a2a;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
}

/* WELCOME */
.welcome {
  background: linear-gradient(135deg, #2c7be5, #4aa3ff);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 12px;
}

/* BUTTON */
#toggleSidebar {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
  border: none;
  background: #1a5fd0;
  color: white;
  border-radius: 6px;
}

/* INPUTS */
input, select, button {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

/* SUGGESTIONS */
#suggestions {
  background: white;
  color: black;
  max-height: 120px;
  overflow-y: auto;
}
</style>
</head>

<body>

<header>
  Nakuru Land Rates System
</header>

<!-- 📱 MOBILE MENU BUTTON -->
<button id="mobileMenuBtn" onclick="toggleMobileMenu()">☰</button>

<div id="container">

<!-- SIDEBAR -->
<div id="sidebar">

<button id="toggleSidebar" onclick="toggleSidebar()">☰ Collapse</button>

<div class="welcome">
<h3>Welcome 👋</h3>
<p>Track land payments, filter parcels, and analyze revenue easily.</p>
</div>

<div class="card">
<h3>How It Works</h3>
<p>Search → Filter → View Map → Analyze → Export</p>
</div>

<div class="card">
<h3>Search</h3>
<input id="searchBox" placeholder="Search plot or owner" oninput="showSuggestions()">
<div id="suggestions"></div>
<button onclick="smartSearch()">Search</button>
</div>

<div class="card">
<h3>Filter</h3>
<select id="statusFilter" onchange="applyFilter()">
<option value="all">All</option>
<option value="paid">Paid</option>
<option value="not">Not Paid</option>
<option value="partial">Partial</option>
</select>
</div>

<div class="card">
<h3>Amount Due</h3>
<input type="range" min="0" max="100000" value="100000"
       oninput="filterByAmount(this.value)">
<p id="sliderValue">100000</p>
</div>

<div class="card" id="stats"></div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<canvas id="barChart"></canvas>
</div>

<div class="card">
<button onclick="exportCSV()">Export CSV</button>
</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

<script>
// 📱 MOBILE MENU TOGGLE
function toggleMobileMenu() {
  const sidebar = document.getElementById("sidebar");
  sidebar.classList.toggle("active");
}
</script>

</body>
</html>
