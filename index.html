<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Land Rates Monitoring System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial, sans-serif;
}

body{
height:100vh;
display:flex;
flex-direction:column;
background:#f3f6fb;
}

/* ===== HEADER ===== */
header{
background:linear-gradient(90deg,#2563eb,#1e40af);
color:white;
padding:14px 18px;
display:flex;
flex-direction:column;
}

header h1{
font-size:18px;
}

header p{
font-size:13px;
opacity:0.9;
}

/* ===== LAYOUT ===== */
#container{
flex:1;
display:flex;
overflow:hidden;
}

/* ===== SIDEBAR ===== */
#sidebar{
width:320px;
background:#0f172a;
color:white;
padding:16px;
overflow-y:auto;
transition:0.3s;
position:relative;
}

#sidebar.collapsed{
width:70px;
}

#sidebar.collapsed .content{
display:none;
}

/* ===== COLLAPSE BUTTON (INSIDE SIDEBAR) ===== */
#collapseBtn{
position:absolute;
top:12px;
right:12px;
background:#2563eb;
border:none;
color:white;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

/* ===== MAP ===== */
#map{
flex:1;
}

/* ===== CARDS ===== */
.card{
background:#1e293b;
padding:14px;
border-radius:12px;
margin-bottom:14px;
}

.card h3{
font-size:15px;
margin-bottom:8px;
color:#60a5fa;
}

/* ===== INPUTS ===== */
input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:8px;
font-size:14px;
}

input,select{
background:#f1f5f9;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

/* ===== LEGEND ===== */
.legend{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
font-size:13px;
}

.legend i{
width:14px;
height:14px;
float:left;
margin-right:6px;
opacity:0.8;
}

</style>
</head>

<body>

<header>
<h1>Land Rates Monitoring System</h1>
<p id="welcomeMessage">Welcome message loading...</p>
</header>

<div id="container">

<div id="sidebar">

<button id="collapseBtn" onclick="toggleSidebar()">⮜</button>

<div class="content">

<div class="card">
<h3>Search Parcel</h3>
<input id="searchBox" placeholder="Plot number or owner name">
<button onclick="smartSearch()">Search</button>
</div>

<div class="card">
<h3>Filter by Status</h3>
<select id="statusFilter" onchange="applyFilter()">
<option value="all">All</option>
<option value="paid">Paid</option>
<option value="not">Not Paid</option>
<option value="partial">Partial</option>
</select>
</div>

<div class="card">
<h3>Filter by Amount Due</h3>
<input type="range" min="0" max="100000" value="100000" oninput="filterByAmount(this.value)">
<p id="sliderValue">100000</p>
</div>

<div class="card" id="stats"></div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<canvas id="barChart"></canvas>
</div>

<div class="card">
<button onclick="exportCSV()">Export CSV</button>
</div>

</div>
</div>

<div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
